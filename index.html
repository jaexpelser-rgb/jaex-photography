<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jaex Photography</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#080808;
    color:white;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(
        45deg,
        #ff004f,
        #ff7b00,
        #ffe600,
        #00ff95,
        #00d9ff,
        #6f00ff
    );
    background-size:400% 400%;
    animation:rainbow 10s ease infinite;
}

@keyframes rainbow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

h1{
    font-size:4rem;
    text-shadow:0 0 20px white;
}

h2{
    margin-top:20px;
    font-weight:normal;
}

.btn{
    margin-top:30px;
    padding:15px 30px;
    background:white;
    color:black;
    text-decoration:none;
    border-radius:30px;
    font-weight:bold;
}

.section{
    padding:80px 20px;
    max-width:1200px;
    margin:auto;
    text-align:center;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:40px;
}

.card{
    padding:20px;
    border:1px solid #333;
    border-radius:15px;
    background:#111;
}
</style>
</head>

<body>

<section class="hero">
    <h1>JAEX PHOTOGRAPHY</h1>
    <h2>Capturing Moments • Celebrating Love • Creating Memories</h2>

    <a href="mailto:jaexphotography@gmail.com" class="btn">
        Book Your Shoot
    </a>
</section>

<section class="section">
    <h2>Photography Services</h2>

    <div class="services">

        <div class="card">
            <h3>Family Shoots</h3>
        </div>

        <div class="card">
            <h3>Couple Shoots</h3>
        </div>

        <div class="card">
            <h3>Maternity Shoots</h3>
        </div>

        <div class="card">
            <h3>Weddings</h3>
        </div>

        <div class="card">
            <h3>Matric Farewell</h3>
        </div>

        <div class="card">
            <h3>Events</h3>
        </div>

    </div>
</section>

</body>
</html>
